<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>访问统计 - 节日烟花祝福</title>
  <link rel="icon" type="image/x-icon" href="./assert/icon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="./assert/icon.png" />
  <link rel="stylesheet" href="./style.css" />
  <style>
    .stats-page {
      min-height: 100vh;
      padding: 60px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: radial-gradient(circle at top, #111827 0, #020617 45%, #000 100%);
    }

    .stats-container {
      max-width: 600px;
      width: 100%;
    }

    .stats-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .stats-title {
      font-size: 32px;
      letter-spacing: 0.1em;
      font-weight: 700;
      color: #fbbf24;
      text-shadow: 0 0 20px rgba(250, 204, 21, 0.8);
      margin-bottom: 16px;
    }

    .stats-subtitle {
      font-size: 16px;
      color: var(--text-muted);
    }

    .stats-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: rgba(15, 23, 42, 0.78);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 20px;
      padding: 32px 24px;
      text-align: center;
      backdrop-filter: blur(18px);
      transition: transform 0.2s, border-color 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      border-color: rgba(248, 171, 94, 0.4);
    }

    .stat-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 16px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(248, 171, 94, 0.2), rgba(249, 115, 22, 0.2));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stat-icon svg {
      width: 28px;
      height: 28px;
      stroke: var(--accent);
    }

    .stat-value {
      font-size: 42px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 8px;
      font-variant-numeric: tabular-nums;
    }

    .stat-label {
      font-size: 14px;
      color: var(--text-muted);
    }

    .stats-info {
      background: rgba(15, 23, 42, 0.78);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 20px;
      padding: 32px;
      backdrop-filter: blur(18px);
      margin-bottom: 32px;
    }

    .stats-info h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--accent);
      margin: 0 0 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .stats-info p {
      font-size: 14px;
      line-height: 1.8;
      color: var(--text-muted);
      margin: 0;
    }

    .updated-time {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 32px;
      justify-content: center;
    }

    .updated-time svg {
      width: 16px;
      height: 16px;
    }

    .stats-footer {
      text-align: center;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: linear-gradient(135deg, #fb923c 0%, #f97316 100%);
      color: #111827;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(248, 171, 94, 0.5);
    }

    .loading {
      opacity: 0.5;
    }

    @media (max-width: 768px) {
      .stats-page {
        padding: 40px 16px;
      }

      .stats-header {
        margin-bottom: 24px;
      }

      .stats-title {
        font-size: 24px;
      }

      .stat-card {
        padding: 24px 20px;
      }

      .stat-value {
        font-size: 32px;
      }

      .stats-cards {
        gap: 16px;
      }

      .stats-info {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="stats-page">
    <div class="stats-container">
      <header class="stats-header">
        <h1 class="stats-title">📊 访问统计</h1>
        <p class="stats-subtitle">数据来源于 不蒜子</p>
      </header>

      <div class="stats-cards">
        <div class="stat-card">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </div>
          <div class="stat-value" id="busuanziPvValue">-</div>
          <div class="stat-label">总访问量 (PV)</div>
        </div>

        <div class="stat-card">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
          </div>
          <div class="stat-value" id="busuanziUvValue">-</div>
          <div class="stat-label">独立访客 (UV)</div>
        </div>
      </div>

      <div class="updated-time">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <span>数据更新时间：<span id="updateTime">-</span></span>
      </div>

      <div class="stats-info">
        <h2>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 16v-4M12 8h.01"/>
          </svg>
          数据说明
        </h2>
        <p>
          本页面展示的统计数据来源于 <a href="https://busuanzi.ibruce.info/" target="_blank" style="color: var(--accent);">不蒜子</a>，
          提供网站的实时访问统计。
        </p>
      </div>

      <footer class="stats-footer">
        <a href="./index.html" class="btn-home">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          返回首页
        </a>
      </footer>
    </div>
  </div>

  <script>
    async function loadStats() {
      try {
        const res = await fetch('./stats.json?t=' + Date.now());
        if (res.ok) {
          const data = await res.json();

          // 兼容新旧两种格式
          // 新格式: { latest: { pv, uv }, history: {...}, updated_at }
          // 旧格式: { busuanzi: { pv, uv }, updated_at }
          let pv, uv;

          if (data.latest) {
            pv = data.latest.pv;
            uv = data.latest.uv;
          } else if (data.busuanzi) {
            pv = data.busuanzi.pv;
            uv = data.busuanzi.uv;
          }

          document.getElementById('busuanziPvValue').textContent = pv ?? 0;
          document.getElementById('busuanziUvValue').textContent = uv ?? 0;

          document.getElementById('updateTime').textContent = data.updated_at || '-';
        }
      } catch (e) {
        document.getElementById('busuanziPvValue').textContent = '加载失败';
        document.getElementById('busuanziUvValue').textContent = '加载失败';
      }
    }
    loadStats();
  </script>
</body>
</html>

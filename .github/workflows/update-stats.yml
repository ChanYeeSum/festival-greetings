name: Update Page Views Stats

on:
  schedule:
    # 每6小时运行一次
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch GitHub Pages Traffic
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 获取仓库流量统计
          VIEWS=$(gh api repos/${{ github.repository }}/traffic/views --jq '.count')
          UNIQUES=$(gh api repos/${{ github.repository }}/traffic/views --jq '.uniques')
          
          # 获取今日日期
          TODAY=$(date -u +"%Y-%m-%d")
          
          # 创建或更新 stats.json
          if [ -f stats.json ]; then
            # 读取现有数据并更新
            TOTAL_VIEWS=$(jq -r '.total_views // 0' stats.json)
            TOTAL_UNIQUES=$(jq -r '.total_uniques // 0' stats.json)
            
            # 累加统计（GitHub API 只返回最近14天数据）
            NEW_VIEWS=$((TOTAL_VIEWS + VIEWS))
            NEW_UNIQUES=$((TOTAL_UNIQUES + UNIQUES))
          else
            NEW_VIEWS=$VIEWS
            NEW_UNIQUES=$UNIQUES
          fi
          
          # 生成 stats.json
          cat > stats.json << EOF
          {
            "total_views": $NEW_VIEWS,
            "total_uniques": $NEW_UNIQUES,
            "updated_at": "$TODAY"
          }
          EOF
          
          echo "Stats updated: Views=$NEW_VIEWS, Uniques=$NEW_UNIQUES"

      - name: Commit stats
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add stats.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update page views stats [skip ci]"
          git push

<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title data-i18n="page.title">节日烟花祝福</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  </head>
  <body>
    <div class="app-container">
      <canvas id="fireworks"></canvas>

      <!-- 左侧编辑面板 (PC端) / 底部编辑面板 (移动端) -->
      <aside class="edit-panel">
        <div class="panel-header">
          <div class="logo" data-i18n="header.logo">✦ 节日烟花 ✦</div>
          <button id="langSelectPc" class="lang-select-pc">
            <span id="langLabelPc">中文</span>
          </button>
        </div>

        <div class="panel-body">
          <div class="form-section">
            <h2 class="section-title" data-i18n="section.create">创建祝福</h2>

            <div class="form-group">
              <label class="form-label" data-i18n="field.to">祝福给谁</label>
              <input
                id="nameInput"
                type="text"
                class="form-input"
                placeholder="在这里输入 TA 的名字"
                data-i18n-placeholder="placeholder.to"
              />
            </div>

            <div class="form-group">
              <label class="form-label" data-i18n="field.festival">选择节日</label>
              <select id="festivalSelect" class="form-select">
                <option value="新年快乐">新年快乐</option>
                <option value="春节快乐">春节快乐</option>
                <option value="中秋快乐">中秋快乐</option>
                <option value="元宵快乐">元宵快乐</option>
                <option value="国庆快乐">国庆快乐</option>
                <option value="情人节快乐">情人节快乐</option>
                <option value="圣诞快乐">圣诞快乐</option>
                <option value="节日快乐">节日快乐</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label" data-i18n="field.message">祝福语</label>
              <textarea
                id="messageInput"
                class="form-textarea"
                placeholder="输入自定义祝福（可选）"
                data-i18n-placeholder="placeholder.message"
                rows="2"
              ></textarea>
              <button id="randomMessageBtn" class="btn-xs random-message-btn" type="button">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="23 4 23 10 17 10"></polyline>
                  <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                </svg>
                <span data-i18n="btn.randomMessage">随机祝福语</span>
              </button>
            </div>

            <div class="form-group">
              <label class="form-label" data-i18n="field.from">署名</label>
              <input
                id="fromInput"
                type="text"
                class="form-input"
                placeholder="例如：你的朋友"
                data-i18n-placeholder="placeholder.from"
              />
            </div>
          </div>

          <!-- 快捷操作区 -->
          <div class="quick-actions">
            <button id="shareBtn" class="btn primary btn-block" data-i18n="btn.share">
              复制祝福链接
            </button>
          </div>

          <!-- 设置折叠区 -->
          <div class="settings-section">
            <button id="settingsToggle" class="settings-toggle">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
              </svg>
              <span data-i18n="settings.title">动画设置</span>
              <svg class="toggle-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </button>
            <div id="settingsPanel" class="settings-panel">
              <div class="settings-row">
                <label class="settings-label-inline">
                  <span data-i18n="settings.density">烟花密度</span>
                  <input type="range" id="densitySlider" min="1" max="10" value="5" class="range-slider">
                  <span id="densityValue" class="range-value">5</span>
                </label>
              </div>
              <div class="settings-row">
                <label class="settings-label-inline">
                  <span data-i18n="settings.star">星空亮度</span>
                  <input type="range" id="starSlider" min="0" max="10" value="5" class="range-slider">
                  <span id="starValue" class="range-value">5</span>
                </label>
              </div>
              <div class="settings-row settings-row-cols">
                <label class="checkbox-inline">
                  <input type="checkbox" id="cometToggle" checked>
                  <span data-i18n="settings.comet">彗星</span>
                </label>
                <label class="checkbox-inline">
                  <input type="checkbox" id="fireworkToggle" checked>
                  <span data-i18n="settings.firework">烟花</span>
                </label>
                <button id="pauseBtn" class="btn-xs" data-i18n="btn.pause">暂停</button>
              </div>
              <div class="settings-row">
                <label class="checkbox-inline">
                  <input type="checkbox" id="customEffectToggle">
                  <span data-i18n="settings.customEffect">自定义烟花效果</span>
                </label>
              </div>
              <div id="customEffectPanel" class="custom-effect-panel" style="display: none;">
                <div class="settings-row">
                  <div class="effect-group-label" data-i18n="settings.shape">烟花形状</div>
                  <div class="checkbox-grid">
                    <label class="checkbox-inline"><input type="checkbox" class="shape-checkbox" value="sphere" checked><span data-i18n="shape.sphere">球形</span></label>
                    <label class="checkbox-inline"><input type="checkbox" class="shape-checkbox" value="chrysanthemum" checked><span data-i18n="shape.chrysanthemum">菊花</span></label>
                    <label class="checkbox-inline"><input type="checkbox" class="shape-checkbox" value="ring" checked><span data-i18n="shape.ring">环形</span></label>
                    <label class="checkbox-inline"><input type="checkbox" class="shape-checkbox" value="double" checked><span data-i18n="shape.double">双层</span></label>
                    <label class="checkbox-inline"><input type="checkbox" class="shape-checkbox" value="scatter"><span data-i18n="shape.scatter">散射</span></label>
                    <label class="checkbox-inline"><input type="checkbox" class="shape-checkbox" value="willow"><span data-i18n="shape.willow">柳条</span></label>
                    <label class="checkbox-inline"><input type="checkbox" class="shape-checkbox" value="star"><span data-i18n="shape.star">星星</span></label>
                    <label class="checkbox-inline"><input type="checkbox" class="shape-checkbox" value="heart"><span data-i18n="shape.heart">心形</span></label>
                    <label class="checkbox-inline"><input type="checkbox" class="shape-checkbox" value="doubleBurst"><span data-i18n="shape.doubleBurst">双重爆炸</span></label>
                  </div>
                </div>
                <div class="settings-row">
                  <div class="effect-group-label" data-i18n="settings.burstEffect">爆炸效果</div>
                  <div class="checkbox-grid">
                    <label class="checkbox-inline"><input type="checkbox" class="burst-checkbox" value="normal" checked><span data-i18n="burst.normal">普通</span></label>
                    <label class="checkbox-inline"><input type="checkbox" class="burst-checkbox" value="sparkle"><span data-i18n="burst.sparkle">闪烁</span></label>
                    <label class="checkbox-inline"><input type="checkbox" class="burst-checkbox" value="trail"><span data-i18n="burst.trail">拖尾</span></label>
                    <label class="checkbox-inline"><input type="checkbox" class="burst-checkbox" value="glow"><span data-i18n="burst.glow">发光</span></label>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 底部工具栏 -->
        <div class="panel-footer">
          <button id="exportBtn" class="tool-btn" title="导出图片">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            <span data-i18n="btn.export">导出</span>
          </button>
          <button id="qrBtn" class="tool-btn" title="二维码">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"/>
              <rect x="14" y="3" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/>
              <rect x="14" y="14" width="7" height="7"/>
            </svg>
            <span data-i18n="btn.qr">二维码</span>
          </button>
        </div>

        <!-- 作者信息 -->
        <div class="author-info">
          <span>Made with ❤️ by <a href="https://github.com/ChanYeeSum" target="_blank" rel="noopener">ChanYeeSum</a></span>
          <a href="https://github.com/ChanYeeSum/festival-greetings" target="_blank" rel="noopener" class="repo-link">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
            </svg>
            GitHub
          </a>
        </div>
      </aside>

      <!-- 右侧预览区 -->
      <main class="preview-area">
        <div class="greeting-card glass">
          <div class="greeting-main">
            <p id="titleText" class="title-text"></p>
            <p id="subtitleText" class="subtitle-text"></p>
          </div>
          <div class="greeting-footer">
            <span id="timeText"></span>
            <span id="fromText"></span>
          </div>
          <div class="copyright-text">© 节日烟花祝福</div>
        </div>
      </main>

      <!-- 移动端底部工具栏 -->
      <nav class="mobile-toolbar">
        <button id="mobileExportBtn" class="mobile-tool-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <span data-i18n="btn.export">导出</span>
        </button>
        <button id="mobileShareBtn" class="mobile-tool-btn primary">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="18" cy="5" r="3"/>
            <circle cx="6" cy="12" r="3"/>
            <circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
          <span>分享</span>
        </button>
        <button id="mobileQrBtn" class="mobile-tool-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
          </svg>
          <span data-i18n="btn.qr">二维码</span>
        </button>
      </nav>

      <!-- 移动端设置弹窗 -->
      <div id="mobileSettingsModal" class="mobile-settings-modal">
        <div class="mobile-settings-content">
          <div class="mobile-settings-header">
            <h3 data-i18n="settings.title">动画设置</h3>
            <button id="closeMobileSettings" class="mobile-settings-close">&times;</button>
          </div>
          <div class="mobile-settings-body">
            <div class="settings-row">
              <label class="settings-label-inline">
                <span data-i18n="settings.density">烟花密度</span>
                <input type="range" id="densitySliderMobile" min="1" max="10" value="5" class="range-slider">
                <span id="densityValueMobile" class="range-value">5</span>
              </label>
            </div>
            <div class="settings-row">
              <label class="settings-label-inline">
                <span data-i18n="settings.star">星空亮度</span>
                <input type="range" id="starSliderMobile" min="0" max="10" value="5" class="range-slider">
                <span id="starValueMobile" class="range-value">5</span>
              </label>
            </div>
            <div class="settings-row settings-row-cols">
              <label class="checkbox-inline">
                <input type="checkbox" id="cometToggleMobile" checked>
                <span data-i18n="settings.comet">彗星</span>
              </label>
              <label class="checkbox-inline">
                <input type="checkbox" id="fireworkToggleMobile" checked>
                <span data-i18n="settings.firework">烟花</span>
              </label>
            </div>
            <div class="settings-row">
              <label class="checkbox-inline">
                <input type="checkbox" id="customEffectToggleMobile">
                <span data-i18n="settings.customEffect">自定义烟花效果</span>
              </label>
            </div>
            <div id="customEffectPanelMobile" class="custom-effect-panel" style="display: none;">
              <div class="settings-row">
                <div class="effect-group-label" data-i18n="settings.shape">烟花形状</div>
                <div class="checkbox-grid">
                  <label class="checkbox-inline"><input type="checkbox" class="shape-checkbox-mobile" value="sphere" checked><span data-i18n="shape.sphere">球形</span></label>
                  <label class="checkbox-inline"><input type="checkbox" class="shape-checkbox-mobile" value="chrysanthemum" checked><span data-i18n="shape.chrysanthemum">菊花</span></label>
                  <label class="checkbox-inline"><input type="checkbox" class="shape-checkbox-mobile" value="ring" checked><span data-i18n="shape.ring">环形</span></label>
                  <label class="checkbox-inline"><input type="checkbox" class="shape-checkbox-mobile" value="double" checked><span data-i18n="shape.double">双层</span></label>
                  <label class="checkbox-inline"><input type="checkbox" class="shape-checkbox-mobile" value="scatter"><span data-i18n="shape.scatter">散射</span></label>
                  <label class="checkbox-inline"><input type="checkbox" class="shape-checkbox-mobile" value="willow"><span data-i18n="shape.willow">柳条</span></label>
                  <label class="checkbox-inline"><input type="checkbox" class="shape-checkbox-mobile" value="star"><span data-i18n="shape.star">星星</span></label>
                  <label class="checkbox-inline"><input type="checkbox" class="shape-checkbox-mobile" value="heart"><span data-i18n="shape.heart">心形</span></label>
                  <label class="checkbox-inline"><input type="checkbox" class="shape-checkbox-mobile" value="doubleBurst"><span data-i18n="shape.doubleBurst">双重爆炸</span></label>
                </div>
              </div>
              <div class="settings-row">
                <div class="effect-group-label" data-i18n="settings.burstEffect">爆炸效果</div>
                <div class="checkbox-grid">
                  <label class="checkbox-inline"><input type="checkbox" class="burst-checkbox-mobile" value="normal" checked><span data-i18n="burst.normal">普通</span></label>
                  <label class="checkbox-inline"><input type="checkbox" class="burst-checkbox-mobile" value="sparkle"><span data-i18n="burst.sparkle">闪烁</span></label>
                  <label class="checkbox-inline"><input type="checkbox" class="burst-checkbox-mobile" value="trail"><span data-i18n="burst.trail">拖尾</span></label>
                  <label class="checkbox-inline"><input type="checkbox" class="burst-checkbox-mobile" value="glow"><span data-i18n="burst.glow">发光</span></label>
                </div>
              </div>
            </div>
            <div class="settings-row">
              <label class="settings-label-inline">
                <span>语言 / Language</span>
                <select id="langSelectMobile" class="form-select-sm">
                  <option value="zh">中文</option>
                  <option value="en">English</option>
                </select>
              </label>
            </div>
            <div class="settings-row">
              <button id="pauseBtnMobile" class="btn btn-secondary btn-block" data-i18n="btn.pause">暂停动画</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 二维码弹窗 -->
    <div id="qrModal" class="qr-modal">
      <div class="qr-modal-content">
        <button id="qrModalClose" class="qr-modal-close">&times;</button>
        <h3 data-i18n="qr.title">扫码分享祝福</h3>
        <canvas id="qrCanvas" width="200" height="200"></canvas>
        <p class="qr-hint" data-i18n="qr.hint">扫描二维码即可打开祝福页面</p>
      </div>
    </div>

    <!-- 观看模式浮动入口 -->
    <button id="makeSameBtn" class="floating-make-btn" type="button">
      <span data-i18n="btn.makeSame">制作同款祝福</span>
    </button>

    <!-- 观看 30s 提示 -->
    <div id="viewPromptModal" class="prompt-modal" aria-hidden="true">
      <div class="prompt-content glass" role="dialog" aria-modal="true">
        <div class="prompt-title" data-i18n="prompt.title">想制作同款祝福吗？</div>
        <div class="prompt-subtitle" data-i18n="prompt.subtitle">
          你可以在编辑面板里改名字、节日、祝福语和特效设置，然后生成专属链接分享。
        </div>
        <div class="prompt-actions">
          <button id="promptYesBtn" class="btn primary" type="button">
            <span data-i18n="prompt.yes">是的，去制作</span>
          </button>
          <button id="promptNoBtn" class="btn secondary" type="button">
            <span data-i18n="prompt.no">继续观看</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <!-- 访问统计（隐藏，仅在控制台输出） -->
    <span id="busuanzi_container_site_pv" style="display:none">
      <span id="busuanzi_value_site_pv"></span>
    </span>
    <span id="busuanzi_container_site_uv" style="display:none">
      <span id="busuanzi_value_site_uv"></span>
    </span>

    <script src="./script.js"></script>
    <script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    <script>
      // 不蒜子统计调试 - 每秒检查一次
      var checkCount = 0;
      var checkStats = setInterval(function() {
        checkCount++;
        var pv = document.getElementById('busuanzi_value_site_pv');
        var uv = document.getElementById('busuanzi_value_site_uv');
        var pvVal = pv ? pv.textContent : 'null';
        var uvVal = uv ? uv.textContent : 'null';
        console.log('[' + checkCount + 's] PV:', pvVal, '| UV:', uvVal);
        if (pvVal && uvVal && pvVal !== '' && uvVal !== '') {
          console.log('不蒜子数据加载成功! PV=' + pvVal + ', UV=' + uvVal);
          clearInterval(checkStats);
        }
        if (checkCount >= 10) {
          console.log('不蒜子数据加载超时，请检查网络');
          clearInterval(checkStats);
        }
      }, 1000);
    </script>
  </body>
</html>

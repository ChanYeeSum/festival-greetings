<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title data-i18n="page.title">节日烟花祝福</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="page">
      <canvas id="fireworks"></canvas>

      <header class="header">
        <div class="logo" data-i18n="header.logo">✦ 节日烟花 ✦</div>
        <div class="controls">
          <label class="field">
            <span data-i18n="field.to">祝福给谁：</span>
            <input
              id="nameInput"
              type="text"
              placeholder="在这里输入 TA 的名字"
              data-i18n-placeholder="placeholder.to"
            />
          </label>
          <label class="field">
            <span data-i18n="field.festival">节日：</span>
            <select id="festivalSelect">
              <option value="新年快乐">新年快乐</option>
              <option value="春节快乐">春节快乐</option>
              <option value="中秋快乐">中秋快乐</option>
              <option value="元宵快乐">元宵快乐</option>
              <option value="国庆快乐">国庆快乐</option>
              <option value="情人节快乐">情人节快乐</option>
              <option value="圣诞快乐">圣诞快乐</option>
              <option value="节日快乐">节日快乐</option>
            </select>
          </label>
          <label class="field field-message">
            <span data-i18n="field.message">祝福语：</span>
            <input
              id="messageInput"
              type="text"
              placeholder="输入自定义祝福（可选）"
              data-i18n-placeholder="placeholder.message"
            />
          </label>
          <label class="field field-from">
            <span data-i18n="field.from">署名：</span>
            <input
              id="fromInput"
              type="text"
              placeholder="例如：你的朋友"
              data-i18n-placeholder="placeholder.from"
            />
          </label>
          <button id="shareBtn" class="btn primary" data-i18n="btn.share">
            复制祝福链接
          </button>
          <button id="exportBtn" class="btn secondary" data-i18n="btn.export">
            导出图片
          </button>
          <button id="qrBtn" class="btn secondary" data-i18n="btn.qr">
            二维码
          </button>
          <button id="settingsBtn" class="btn secondary" data-i18n="btn.settings">
            设置
          </button>
        </div>
      </header>

      <main class="content">
        <div class="greeting-card glass">
          <div class="greeting-main">
            <p id="titleText" class="title-text"></p>
            <p id="subtitleText" class="subtitle-text"></p>
          </div>
          <div class="greeting-footer">
            <span id="timeText"></span>
            <span id="fromText"></span>
          </div>
        </div>
      </main>

      <footer class="footer">
        <span data-i18n="footer.tipPrefix">提示：在地址栏中使用</span>
        <code>?name=小明&festival=新年快乐</code>
        <span data-i18n="footer.tipSuffix">即可直接生成专属祝福。</span>
      </footer>
    </div>

    <!-- 二维码弹窗 -->
    <div id="qrModal" class="qr-modal">
      <div class="qr-modal-content">
        <button id="qrModalClose" class="qr-modal-close">&times;</button>
        <h3 data-i18n="qr.title">扫码分享祝福</h3>
        <canvas id="qrCanvas" width="200" height="200"></canvas>
        <p class="qr-hint" data-i18n="qr.hint">扫描二维码即可打开祝福页面</p>
      </div>
    </div>

    <!-- 设置弹窗 -->
    <div id="settingsModal" class="qr-modal">
      <div class="qr-modal-content settings-content">
        <button id="settingsModalClose" class="qr-modal-close">&times;</button>
        <h3 data-i18n="settings.title">动画设置</h3>
        <div class="settings-group">
          <label class="settings-label">
            <span data-i18n="settings.lang">语言</span>
            <select id="langSelect" style="flex: 1">
              <option value="zh">中文</option>
              <option value="en">English</option>
            </select>
          </label>
        </div>
        <div class="settings-group">
          <label class="settings-label">
            <span data-i18n="settings.density">烟花密度</span>
            <input type="range" id="densitySlider" min="1" max="10" value="5">
            <span id="densityValue">5</span>
          </label>
        </div>
        <div class="settings-group">
          <label class="settings-label">
            <span data-i18n="settings.star">星空亮度</span>
            <input type="range" id="starSlider" min="0" max="10" value="5">
            <span id="starValue">5</span>
          </label>
        </div>
        <div class="settings-group">
          <label class="settings-label checkbox-label">
            <input type="checkbox" id="cometToggle" checked>
            <span data-i18n="settings.comet">显示彗星</span>
          </label>
        </div>
        <div class="settings-group">
          <label class="settings-label checkbox-label">
            <input type="checkbox" id="fireworkToggle" checked>
            <span data-i18n="settings.firework">显示烟花</span>
          </label>
        </div>
        <div class="settings-actions">
          <button id="pauseBtn" class="btn secondary" data-i18n="btn.pause">
            暂停动画
          </button>
        </div>
      </div>
    </div>

    <!-- 观看模式浮动入口 -->
    <button id="makeSameBtn" class="floating-make-btn" type="button">
      <span data-i18n="btn.makeSame">制作同款祝福</span>
    </button>

    <!-- 观看 30s 提示 -->
    <div id="viewPromptModal" class="prompt-modal" aria-hidden="true">
      <div class="prompt-content glass" role="dialog" aria-modal="true">
        <div class="prompt-title" data-i18n="prompt.title">想制作同款祝福吗？</div>
        <div class="prompt-subtitle" data-i18n="prompt.subtitle">
          你可以在编辑面板里改名字、节日、祝福语和特效设置，然后生成专属链接分享。
        </div>
        <div class="prompt-actions">
          <button id="promptYesBtn" class="btn primary" type="button">
            <span data-i18n="prompt.yes">是的，去制作</span>
          </button>
          <button id="promptNoBtn" class="btn secondary" type="button">
            <span data-i18n="prompt.no">继续观看</span>
          </button>
        </div>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
